name: Build Local Installer

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          cd frontend && npm install && cd ..

      - name: Build frontend
        run: |
          cd frontend && npm run build && cd ..

      - name: Package application
        run: |
          # Create dist directory
          mkdir -p dist
          
          # Copy backend files
          cp -r index.js package*.json prisma routes middleware database dist/
          
          # Copy frontend build
          cp -r frontend/dist dist/frontend/
          
          # Create .env.example
          cp .env.example dist/.env.example
          
          # Create start script
          cat > dist/start.sh << 'EOF'
#!/bin/bash
npm install
npx prisma generate
node index.js
EOF
          chmod +x dist/start.sh
          
          # Create installation instructions
          cat > dist/INSTALL.md << 'EOF'
# 博客系统安装说明

## 环境要求
- Node.js >= 18.0.0
- npm

## 安装步骤
1. 解压安装包
2. 进入解压目录
3. 复制 .env.example 为 .env 并修改配置
4. 运行 ./start.sh 启动服务
5. 访问 http://localhost:3000

## 默认账号
- 管理员：admin@example.com / admin123
- 普通用户：user@example.com / user123
EOF

      - name: Create archive
        run: |
          cd dist
          tar -czf ../blog-installer-linux-x64.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blog-installer-linux-x64
          path: blog-installer-linux-x64.tar.gz
          retention-days: 30
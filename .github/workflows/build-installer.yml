name: Build Local Installer

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: |
          echo "Installing backend dependencies..."
          npm install
          echo "Installing frontend dependencies..."
          cd frontend && npm install && cd ..

      - name: Build frontend
        run: |
          echo "Building frontend..."
          cd frontend && npm run build && cd ..

      - name: Package application
        run: |
          echo "Creating dist directory..."
          mkdir -p dist
          
          echo "Copying backend files..."
          cp -r index.js package*.json prisma routes middleware database dist/
          
          echo "Copying frontend build..."
          cp -r frontend/dist dist/frontend/
          
          echo "Creating .env.example..."
          cp .env.example dist/.env.example
          
          echo "Creating start script..."
          cat > dist/start.sh << 'EOF'
#!/bin/bash

echo "Starting blog system installation..."

# 检查并创建 .env 文件
if [ ! -f ".env" ]; then
  echo "Creating .env file..."
  cp .env.example .env
  
  # 配置默认的 SQLite 数据库连接
  echo "Configuring SQLite database connection..."
  sed -i 's|DATABASE_URL=.*|DATABASE_URL="file:./dev.db"|g' .env
  
  # 生成随机 JWT 密钥
  echo "Generating JWT secret..."
  JWT_SECRET=$(openssl rand -base64 32)
  sed -i "s|JWT_SECRET=.*|JWT_SECRET=\"$JWT_SECRET\"|g" .env
  
  echo ".env file created successfully!"
fi

# 安装依赖
echo "Installing dependencies..."
npm install

# 生成 Prisma Client
echo "Generating Prisma Client..."
npx prisma generate

# 运行数据库迁移
echo "Running database migrations..."
npx prisma migrate dev --name init --force-reset

# 插入种子数据
echo "Inserting seed data..."
npm run db:seed

# 启动服务
echo "Starting service..."
echo "Service will run on http://localhost:3000"
echo "Default accounts:"
echo "- Admin: admin@example.com / admin123"
echo "- User: user@example.com / user123"
node index.js
EOF
          chmod +x dist/start.sh
          
          echo "Creating installation instructions..."
          cat > dist/INSTALL.md << 'EOF'
# 博客系统安装说明

## 环境 Requirements
- Node.js >= 18.0.0
- npm
- openssl (for generating JWT secret)

## Installation Steps
1. Extract the installation package
2. Enter the extracted directory
3. Run ./start.sh to start the service
4. Access http://localhost:3000

## Automatic Configuration
The start script will automatically:
- Create and configure .env file
- Configure default SQLite database connection
- Generate random JWT secret
- Install dependencies
- Generate Prisma Client
- Run database migrations
- Insert seed data
- Start the service

## Default Accounts
- Admin: admin@example.com / admin123
- User: user@example.com / user123
EOF

      - name: Create archive
        run: |
          echo "Creating archive..."
          cd dist
          tar -czf ../blog-installer-linux-x64.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blog-installer-linux-x64
          path: blog-installer-linux-x64.tar.gz
          retention-days: 30
name: Build Local Installer

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          cd frontend && npm install && cd ..

      - name: Build frontend
        run: |
          cd frontend && npm run build && cd ..

      - name: Package application
        run: |
          # Create dist directory
          mkdir -p dist
          
          # Copy backend files
          cp -r index.js package*.json prisma routes middleware database dist/
          
          # Copy frontend build
          cp -r frontend/dist dist/frontend/
          
          # Create .env.example
          cp .env.example dist/.env.example
          
          # Create start script
          cat > dist/start.sh << 'EOF'
#!/bin/bash

# 检查并创建 .env 文件
if [ ! -f ".env" ]; then
  echo "创建 .env 文件..."
  cp .env.example .env
  
  # 配置默认的 SQLite 数据库连接
  echo "配置 SQLite 数据库连接..."
  sed -i 's|DATABASE_URL=.*|DATABASE_URL="file:./dev.db"|g' .env
  
  # 生成随机 JWT 密钥
  JWT_SECRET=$(openssl rand -base64 32)
  sed -i "s|JWT_SECRET=.*|JWT_SECRET=\"$JWT_SECRET\"|g" .env
  
  echo ".env 文件创建成功！"
fi

# 安装依赖
echo "安装依赖..."
npm install

# 生成 Prisma Client
echo "生成 Prisma Client..."
npx prisma generate

# 运行数据库迁移
echo "运行数据库迁移..."
npx prisma migrate dev --name init --force-reset

# 插入种子数据
echo "插入种子数据..."
npm run db:seed

# 启动服务
echo "启动服务..."
echo "服务将在 http://localhost:3000 上运行"
echo "默认账号："
echo "- 管理员：admin@example.com / admin123"
echo "- 普通用户：user@example.com / user123"
node index.js
EOF
          chmod +x dist/start.sh
          
          # Create installation instructions
          cat > dist/INSTALL.md << 'EOF'
# 博客系统安装说明

## 环境要求
- Node.js >= 18.0.0
- npm
- openssl (用于生成 JWT 密钥)

## 安装步骤
1. 解压安装包
2. 进入解压目录
3. 运行 ./start.sh 启动服务
4. 访问 http://localhost:3000

## 自动配置说明
启动脚本会自动完成以下操作：
- 创建并配置 .env 文件
- 配置默认的 SQLite 数据库连接
- 生成随机 JWT 密钥
- 安装依赖
- 生成 Prisma Client
- 运行数据库迁移
- 插入种子数据
- 启动服务

## 默认账号
- 管理员：admin@example.com / admin123
- 普通用户：user@example.com / user123
EOF

      - name: Create archive
        run: |
          cd dist
          tar -czf ../blog-installer-linux-x64.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blog-installer-linux-x64
          path: blog-installer-linux-x64.tar.gz
          retention-days: 30